<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 검사 · 문항 2</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="card test-card">
    <h1 class="test-title">성격유형 검사</h1>
    <p class="subtitle">11~20번 문항입니다. 모두 선택하면 결과를 확인할 수 있습니다.</p>

    <!-- 1페이지 답변을 hidden input으로 함께 제출한다 -->
    <form action="{{ url_for('result') }}" method="post">
      {% for name, value in first_answers %}
      <input type="hidden" name="{{ name }}" value="{{ value }}">
      {% endfor %}

      {% for q in questions %}
      <div class="q-card">
        <p class="q-text"><span class="q-num">{{ start_index + loop.index }}</span>{{ q.text }}</p>

        <div class="opts">
          <span class="opt-label left">매우<br>그렇다</span>
          {% for opt in options %}
          <label class="opt {{ opt.cls }}">
            <input type="radio" name="{{ q.name }}" value="{{ opt.value }}" required>
            <span class="circle"></span>
          </label>
          {% endfor %}
          <span class="opt-label right">전혀<br>아니다</span>
        </div>
      </div>
      {% endfor %}

      <button type="submit" class="btn">결과 보기</button>
    </form>
  </main>
</body>
</html>
